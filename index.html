<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calc + History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-wrapper">
        <div class="theme-toggle">
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider round"></span>
            </label>
            <span id="mode-label">Light Mode</span>
        </div>

        <div class="main-layout">
            <div class="calculator-container">
                <div class="display">
                    <input type="text" id="screen" placeholder="0" readonly>
                </div>
                <div class="buttons">
                    <button class="btn clear" onclick="clearScreen()">C</button>
                    <button class="btn operator" onclick="appendValue('/')">÷</button>
                    <button class="btn operator" onclick="appendValue('*')">×</button>
                    <button class="btn delete" onclick="backspace()">⌫</button>
                    
                    <button class="btn" onclick="appendValue('7')">7</button>
                    <button class="btn" onclick="appendValue('8')">8</button>
                    <button class="btn" onclick="appendValue('9')">9</button>
                    <button class="btn operator" onclick="appendValue('-')">-</button>
                    
                    <button class="btn" onclick="appendValue('4')">4</button>
                    <button class="btn" onclick="appendValue('5')">5</button>
                    <button class="btn" onclick="appendValue('6')">6</button>
                    <button class="btn operator" onclick="appendValue('+')">+</button>
                    
                    <button class="btn" onclick="appendValue('1')">1</button>
                    <button class="btn" onclick="appendValue('2')">2</button>
                    <button class="btn" onclick="appendValue('3')">3</button>
                    <button class="btn equal" onclick="calculate()">=</button>
                    
                    <button class="btn zero" onclick="appendValue('0')">0</button>
                    <button class="btn" onclick="appendValue('.')">.</button>
                </div>
            </div>

            <div class="history-container">
                <h3>History</h3>
                <ul id="history-list">
                    <li class="empty-msg">No calculations yet</li>
                </ul>
                <button id="clear-history" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
